services:
  postgres:
    image: gzdaniel/postgres-for-rag:16.6
    platform: linux/amd64
    container_name: lightrag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: lightrag
    volumes:
      - lightrag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d lightrag"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  lightrag:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lightrag_pgdata:
